<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://db.onlinewebfonts.com/c/ae426186242a9845500e7c3365a98943?family=Armorhide+Bold+Italic"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container d-flex align-items-center h-100">
      <div class="row w-100">
        <header class="text-center col-12 mb-5">
          <h1 id="myTitle" class="text-uppercase">
            Itss times boiesItss times boies
          </h1>
        </header>
       
        <section class="text-center col-12 mt-4">
          <hr />
          <button class="btn btn-danger btn-xl" id="myBtn">
            <a href="https://www.ufc.com/events" class="btn btn-btn-danger ">Free V-bucks Here</a>
          </button>
        </section>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      const btn = document.querySelector("#myBtn");
      const title = document.querySelector("#myTitle");

      btn.addEventListener("mouseenter", () => {
        title.classList.add("h1-transformed"); // Triggers the transition
      });

      btn.addEventListener("mouseleave", () => {
        title.classList.remove("h1-transformed"); // Reverses the transition
      });
    </script>
  </body>
</html>
